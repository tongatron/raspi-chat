<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Chat</title>
  <link rel="manifest" href="/chat/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Chat" />
  <link rel="apple-touch-icon" href="/chat/icon-192.png" />
  <link rel="icon" href="/chat/icon-192.png" />
  <meta name="theme-color" content="#1f6fd2" />
  <style>
    :root {
      --bg-top: #f4ede2;
      --bg-mid: #edf3fb;
      --bg-bottom: #faf7f1;
      --surface: rgba(255,255,255,.74);
      --surface-strong: rgba(255,255,255,.92);
      --surface-muted: rgba(247,250,253,.92);
      --border: rgba(21,39,66,.10);
      --border-strong: rgba(29,62,102,.16);
      --ink: #1d2a39;
      --muted: #697586;
      --muted-soft: #8d98a7;
      --primary: #1f6fd2;
      --primary-strong: #1559ad;
      --primary-soft: #eaf2ff;
      --accent: #d56a45;
      --success: #26a269;
      --warning: #f0b758;
      --shadow: 0 24px 60px rgba(36,58,89,.12);
      --shadow-soft: 0 12px 30px rgba(36,58,89,.08);
      --message-surface: rgba(255,255,255,.56);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-mid) 46%, var(--bg-bottom));
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -12% auto auto -12%;
      width: min(42vw, 460px);
      height: min(42vw, 460px);
      background: radial-gradient(circle, rgba(31,111,210,.20), rgba(31,111,210,0));
      filter: blur(8px);
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      right: -12%;
      bottom: -16%;
      width: min(44vw, 500px);
      height: min(44vw, 500px);
      background: radial-gradient(circle, rgba(213,106,69,.18), rgba(213,106,69,0));
      filter: blur(12px);
      pointer-events: none;
    }
    #login, #chat, #lightbox { position: relative; z-index: 1; }
    body.theme-dark {
      --bg-top: #090d14;
      --bg-mid: #0d1420;
      --bg-bottom: #070b12;
      --surface: rgba(10,16,26,.84);
      --surface-strong: rgba(14,21,33,.94);
      --surface-muted: rgba(18,26,39,.94);
      --border: rgba(214,228,247,.18);
      --border-strong: rgba(224,236,252,.28);
      --ink: #f3f7fd;
      --muted: #b4c0cf;
      --muted-soft: #91a0b4;
      --primary: #7ab4ff;
      --primary-strong: #539cf2;
      --primary-soft: rgba(122,180,255,.16);
      --accent: #f09c75;
      --success: #6fe0a8;
      --warning: #f4c972;
      --shadow: 0 24px 60px rgba(0,0,0,.42);
      --shadow-soft: 0 12px 30px rgba(0,0,0,.30);
      --message-surface: rgba(7,11,18,.72);
    }
    body.theme-dark::before {
      background: radial-gradient(circle, rgba(86,150,255,.18), rgba(86,150,255,0));
    }
    body.theme-dark::after {
      background: radial-gradient(circle, rgba(40,82,141,.18), rgba(40,82,141,0));
    }
    body.theme-dark .login-box,
    body.theme-dark header,
    body.theme-dark #messages,
    body.theme-dark #reply-bar,
    body.theme-dark #input-area,
    body.theme-dark #image-preview,
    body.theme-dark #notif-banner,
    body.theme-dark #debug-log {
      border-color: rgba(229,239,252,.18);
      box-shadow: 0 18px 42px rgba(0,0,0,.34);
    }
    body.theme-dark .login-eyebrow,
    body.theme-dark .selected-user,
    body.theme-dark .user-btn,
    body.theme-dark .pwd-input,
    body.theme-dark #load-more-btn,
    body.theme-dark .toolbar-btn,
    body.theme-dark #logout-btn,
    body.theme-dark #attach-btn,
    body.theme-dark #image-preview button,
    body.theme-dark #reply-cancel,
    body.theme-dark .delete-btn,
    body.theme-dark .reply-btn {
      border-color: rgba(229,239,252,.16);
    }
    body.theme-dark .login-eyebrow,
    body.theme-dark .selected-user,
    body.theme-dark .user-btn,
    body.theme-dark .pwd-input,
    body.theme-dark #load-more-btn,
    body.theme-dark .toolbar-btn,
    body.theme-dark #logout-btn,
    body.theme-dark #attach-btn,
    body.theme-dark #image-preview,
    body.theme-dark #debug-log,
    body.theme-dark #typing-indicator {
      background: rgba(17,25,37,.84);
    }
    body.theme-dark .user-btn:hover,
    body.theme-dark .toolbar-btn:hover,
    body.theme-dark #attach-btn:hover,
    body.theme-dark #console-btn:hover,
    body.theme-dark #logout-btn:hover,
    body.theme-dark #load-more-btn:hover,
    body.theme-dark #image-preview button:hover,
    body.theme-dark #reply-cancel:hover,
    body.theme-dark .reply-btn:hover,
    body.theme-dark .delete-btn:hover {
      background: rgba(122,180,255,.14);
    }
    body.theme-dark #input-area textarea {
      background: rgba(8,14,24,.88);
      border-color: rgba(229,239,252,.14);
      color: var(--ink);
    }
    body.theme-dark #input-area textarea:focus {
      background: rgba(10,16,27,.96);
      border-color: rgba(122,180,255,.42);
    }
    body.theme-dark .other .bubble {
      background: rgba(16,24,36,.96);
      border-color: rgba(229,239,252,.14);
    }
    body.theme-dark .me .bubble {
      background: linear-gradient(180deg, #327bdb, #225fb2);
      border-color: rgba(255,255,255,.12);
    }
    body.theme-dark .link-preview {
      background: rgba(12,18,28,.96);
      border-color: rgba(229,239,252,.14);
      box-shadow: 0 12px 26px rgba(0,0,0,.28);
    }
    body.theme-dark .private-card,
    body.theme-dark .private-list,
    body.theme-dark .private-item {
      border-color: rgba(229,239,252,.18);
      box-shadow: 0 18px 42px rgba(0,0,0,.34);
    }
    body.theme-dark .private-item,
    body.theme-dark #private-refresh-btn {
      background: rgba(17,25,37,.84);
    }
    body.theme-dark #private-save-note-btn,
    body.theme-dark .private-note-badge {
      background: rgba(17,25,37,.84);
      color: var(--muted);
      border-color: rgba(229,239,252,.16);
    }
    body.theme-dark #private-note {
      background: rgba(8,14,24,.88);
      border-color: rgba(229,239,252,.14);
      color: var(--ink);
    }
    body.theme-dark #private-note:focus {
      background: rgba(10,16,27,.96);
      border-color: rgba(122,180,255,.42);
    }
    body.theme-dark .private-download,
    body.theme-dark #private-refresh-btn:hover {
      background: rgba(122,180,255,.14);
    }
    body.theme-dark #private-save-note-btn:hover {
      background: rgba(122,180,255,.14);
    }
    body.theme-dark .me .link-preview {
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.16);
    }
    body.theme-dark #notif-banner {
      background: linear-gradient(180deg, rgba(77,60,27,.96), rgba(61,47,23,.98));
      color: #f7d89e;
      border-color: rgba(244,201,114,.24);
    }
    body.theme-dark #messages::-webkit-scrollbar-thumb {
      background: rgba(122,180,255,.28);
    }

    /* Login */
    #login { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box {
      width: min(430px, 100%);
      padding: 34px;
      text-align: center;
      border-radius: 32px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      animation: panelIn .45s ease both;
    }
    .login-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .login-box h1 { font-size: clamp(2rem, 4vw, 2.6rem); letter-spacing: -.04em; margin-bottom: 8px; }
    .login-copy { color: var(--muted); margin-bottom: 28px; font-size: 1rem; line-height: 1.55; }
    #step-users > p, #step-password > p { color: var(--muted); margin-bottom: 18px; font-size: .95rem; font-weight: 600; letter-spacing: .01em; }
    .user-list { display: flex; flex-direction: column; gap: 12px; }
    .user-btn {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.82);
      color: var(--ink);
      border: 1.5px solid rgba(21,39,66,.08);
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(31,111,210,.28);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(234,242,255,.95));
      box-shadow: var(--shadow-soft);
    }
    .user-btn:active { transform: translateY(0); }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .96rem;
      flex-shrink: 0;
    }
    #step-password { display: none; }
    .selected-user {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .selected-user span:last-child { font-weight: 700; font-size: 1.05rem; }
    .pwd-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(21,39,66,.10);
      border-radius: 16px;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      font-family: inherit;
      color: var(--ink);
      background: rgba(255,255,255,.86);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .pwd-input:focus {
      border-color: rgba(31,111,210,.55);
      box-shadow: 0 0 0 4px rgba(31,111,210,.12);
      background: rgba(255,255,255,.96);
    }
    .login-error { color: #d14343; font-size: .88rem; margin-bottom: 12px; min-height: 20px; }
    .login-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(180deg, var(--primary), var(--primary-strong));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      box-shadow: 0 16px 28px rgba(31,111,210,.22);
    }
    .login-submit:hover { transform: translateY(-1px); filter: brightness(1.03); }
    .login-submit:disabled { opacity: .6; cursor: default; box-shadow: none; }
    .back-link { background: none; border: none; color: var(--muted); font-size: .9rem; cursor: pointer; text-decoration: underline; }

    /* Chat layout */
    #chat {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100dvh;
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: clamp(10px, 2vw, 20px);
      gap: 10px;
      animation: panelIn .35s ease both;
    }
    header {
      min-height: 78px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-radius: 26px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.70);
      box-shadow: var(--shadow-soft);
    }
    .header-main { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .header-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(180deg, #2f7de1, #175aaa);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .92rem;
      letter-spacing: .08em;
      box-shadow: 0 14px 24px rgba(23,90,170,.22);
      flex-shrink: 0;
    }
    .header-copy { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    header h2 { font-size: 1.16rem; letter-spacing: -.03em; }
    .header-presence { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .presence-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(38,162,105,.14);
      animation: pulseDot 2.4s ease infinite;
      flex-shrink: 0;
    }
    #online-list {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #online-list:empty::before { content: "Connessione in corso"; }
    .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .toolbar-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: rgba(15,34,59,.06);
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    }
    .toolbar-btn:hover {
      transform: translateY(-1px);
      background: var(--primary-soft);
      color: var(--primary);
      box-shadow: 0 10px 18px rgba(31,111,210,.12);
    }
    #notif-btn { opacity: .56; }
    #notif-btn:hover { opacity: 1; }
    #console-btn,
    #archive-btn {
      display: none;
      height: 42px;
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      background: rgba(15,34,59,.06);
      color: var(--muted);
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      align-items: center;
      justify-content: center;
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }
    #console-btn:hover,
    #archive-btn:hover { transform: translateY(-1px); background: rgba(15,34,59,.10); color: var(--ink); }
    #archive-btn.active {
      background: var(--primary-soft);
      color: var(--primary-strong);
    }
    #logout-btn {
      height: 42px;
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      background: rgba(15,34,59,.06);
      color: var(--muted);
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }
    #logout-btn:hover { transform: translateY(-1px); background: rgba(15,34,59,.10); color: var(--ink); }
    /* Messages */
    #chat-main-view { display: contents; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px clamp(14px, 2vw, 24px) 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.70);
      box-shadow: var(--shadow);
      background-color: var(--message-surface);
      background-size: cover;
      background-position: center;
      background-attachment: local;
      backdrop-filter: blur(8px);
      scrollbar-width: thin;
      scrollbar-color: rgba(31,111,210,.35) transparent;
      position: relative;
    }
    #messages::-webkit-scrollbar { width: 10px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(31,111,210,.24); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages > * { position: relative; z-index: 1; }
    .msg-wrap { display: flex; flex-direction: column; gap: 4px; max-width: min(74%, 560px); }
    .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.other { align-self: flex-start; align-items: flex-start; }
    .msg-name { font-size: .72rem; color: var(--muted-soft); margin-bottom: 2px; padding: 0 8px; font-weight: 700; letter-spacing: .02em; }
    .bubble {
      padding: 12px 14px;
      border-radius: 22px;
      font-size: .97rem;
      line-height: 1.52;
      word-break: break-word;
      max-width: 100%;
      position: relative;
      box-shadow: 0 10px 24px rgba(28,42,57,.06);
      border: 1px solid transparent;
    }
    .bubble p { margin: 0; }
    .bubble p + p { margin-top: 7px; }
    .me .bubble {
      background: linear-gradient(180deg, #2877da, #1a63c0);
      color: white;
      border-bottom-right-radius: 8px;
      border-color: rgba(255,255,255,.18);
    }
    .other .bubble {
      background: var(--surface-strong);
      color: var(--ink);
      border-bottom-left-radius: 8px;
      border-color: rgba(21,39,66,.08);
    }
    .bubble img.msg-img { max-width: 260px; max-height: 260px; border-radius: 14px; display: block; cursor: pointer; }
    .bubble img.msg-img + p { margin-top: 8px; }
    .msg-meta {
      font-size: .72rem;
      color: var(--muted-soft);
      margin-top: 2px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .me .msg-meta { color: var(--muted); justify-content: flex-end; }
    .msg-status { font-size: .66rem; opacity: .9; }
    .msg-status.read, .me .msg-status.read { color: var(--success); opacity: 1; }

    .reply-btn {
      background: rgba(15,34,59,.06);
      border: none;
      font-size: .82rem;
      cursor: pointer;
      color: var(--muted);
      padding: 4px 9px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .15s ease, background .15s ease, color .15s ease;
      line-height: 1.4;
      font-weight: 700;
    }
    .msg-wrap:hover .reply-btn { opacity: 1; }
    .reply-btn:hover { background: var(--primary-soft); color: var(--primary); }
    .me .reply-btn { background: rgba(255,255,255,.16); color: white; }
    .me .reply-btn:hover { background: rgba(255,255,255,.24); }
    @media (hover: none) { .reply-btn { opacity: .82; } }

    .delete-btn {
      background: rgba(15,34,59,.06);
      border: none;
      font-size: .8rem;
      cursor: pointer;
      color: var(--muted-soft);
      padding: 4px 8px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .15s ease, background .15s ease, color .15s ease;
      line-height: 1;
    }
    .delete-btn:hover { background: rgba(209,67,67,.10); color: #c53a3a; }
    .msg-wrap.me:hover .delete-btn { opacity: 1; }
    @media (hover: none) { .msg-wrap.me .delete-btn { opacity: .7; } }

    .reply-quote {
      border-radius: 14px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: .82rem;
      cursor: pointer;
      border-left: 3px solid;
    }
    .me .reply-quote { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.56); }
    .other .reply-quote { background: rgba(31,111,210,.08); border-color: var(--primary); }
    .rq-name { font-weight: 700; font-size: .75rem; margin-bottom: 2px; }
    .me .rq-name { color: rgba(255,255,255,.96); }
    .other .rq-name { color: var(--primary-strong); }
    .rq-text { opacity: .84; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px; }

    /* Reply bar above input */
    #reply-bar {
      background: rgba(255,255,255,.82);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-soft);
    }
    #reply-bar::before {
      content: "↩";
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    #reply-bar-preview { flex: 1; min-width: 0; text-align: left; }
    #reply-bar-name { font-size: .82rem; font-weight: 700; color: var(--primary-strong); display: block; }
    #reply-bar-text { font-size: .82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    #reply-cancel {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      border-radius: 50%;
      font-size: 1.05rem;
      cursor: pointer;
      color: var(--muted-soft);
      flex-shrink: 0;
    }
    #reply-cancel:hover { background: rgba(15,34,59,.06); color: var(--ink); }

    /* Load more */
    #load-more-wrap {
      display: none;
      align-self: center;
      justify-content: center;
      width: 100%;
      padding: 4px 0 2px;
      text-align: center;
    }
    #load-more-btn {
      min-width: min(100%, 320px);
      background: rgba(255,255,255,.88);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: .85rem;

<body>

<div id="login">
  <div class="login-box">
    <div class="login-eyebrow">Chat privata</div>

<script>
var WS_URL = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/chat/ws';
var ws, myName, myToken, pendingImageUrl = null, swReg = null;
var msgElements = {}; // id -> { wrap, statusEl }

// Reply state
var replyTo = null;

// Pagination state
var oldestTimestamp = null;
var hasMore = true;
var loadingMore = false;

// Unread badge
var unreadCount = 0;
var canUsePrivateTransfers = false;
var currentView = 'chat';
var privateTransferLoading = false;
var privateSelectedFile = null;

function playNotifSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function incrementUnread() {
  unreadCount++;
  document.title = '(' + unreadCount + ') Chat';
  if (navigator.setAppBadge) navigator.setAppBadge(unreadCount);
}
function clearUnread() {
  unreadCount = 0;
  document.title = 'Chat';
  if (navigator.clearAppBadge) navigator.clearAppBadge();
}
document.addEventListener('visibilitychange', function() { if (!document.hidden) clearUnread(); });
window.addEventListener('focus', clearUnread);

// Reply functions
function startReply(msg) {
  replyTo = msg;
  document.getElementById('reply-bar-name').textContent = msg.username;
  document.getElementById('reply-bar-text').textContent = (msg.imageUrl && !msg.text) ? '📎 Immagine' : (msg.text || '');
  document.getElementById('reply-bar').style.display = 'flex';
  document.getElementById('msg-input').focus();
}
function cancelReply() {
  replyTo = null;
  document.getElementById('reply-bar').style.display = 'none';
}

// Scroll to a message
function scrollToMessage(id) {
  var entry = msgElements[id];
  if (!entry) return;
  entry.wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
  entry.wrap.classList.add('msg-highlight');
  setTimeout(function() { entry.wrap.classList.remove('msg-highlight'); }, 700);
}

// Pagination
function setLoadMoreState(state) {
  var wrap = document.getElementById('load-more-wrap');
  var btn = document.getElementById('load-more-btn');
  if (!wrap || !btn) return;

  if (state === 'hidden') {
    wrap.style.display = 'none';
    wrap.classList.remove('done');
    btn.disabled = false;
    btn.textContent = 'Carica altri messaggi';
    return;
  }

  wrap.style.display = 'flex';
  if (state === 'done') {
    wrap.classList.add('done');
    btn.disabled = true;
    btn.textContent = 'Nessun altro messaggio';
    return;
  }

  wrap.classList.remove('done');
  btn.disabled = false;
  btn.textContent = 'Carica altri messaggi';
}

async function loadMoreMessages() {
  if (loadingMore || !hasMore || !oldestTimestamp) return;
  loadingMore = true;
  var btn = document.getElementById('load-more-btn');
  btn.disabled = true; btn.textContent = 'Carico...';
  try {
    var res = await authFetch('/chat/messages?before=' + encodeURIComponent(oldestTimestamp) + '&limit=50');
    var messages = await res.json();
    if (!messages.length) {
      hasMore = false;
      setLoadMoreState('done');
      return;
    }
    var container = document.getElementById('messages');
    var sentinel  = document.getElementById('typing-indicator');
    var oldHeight = container.scrollHeight;
    // prepend in order (messages already sorted oldest-first by server)
    messages.forEach(function(m) {
      var el = buildMessage(m);
      container.insertBefore(el, sentinel);
      trackTimestamp(m.timestamp);
    });
    container.scrollTop += container.scrollHeight - oldHeight;
    if (messages.length < 50) {
      hasMore = false;
      setLoadMoreState('done');
    }
  } catch(e) {}
  loadingMore = false;
  if (hasMore) setLoadMoreState('ready');
}

  });
}

function trackTimestamp(ts) {
  if (!oldestTimestamp || ts < oldestTimestamp) oldestTimestamp = ts;
}

function authHeaders(headers) {

    out['X-Chat-Username'] = myName;

// Push
function urlBase64ToUint8Array(b64) {
  var pad = '='.repeat((4 - b64.length % 4) % 4);
  var base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  var raw = atob(base64); var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function initPush() {
  try {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    swReg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    swReg = await navigator.serviceWorker.ready;
    var perm = Notification.permission;
    var vapidResp = await authFetch('/chat/vapid-public-key');
    var serverKey = (await vapidResp.json()).key;
    var savedKey = localStorage.getItem('chat-vapid-key');
    var sub = null;
    try { sub = await swReg.pushManager.getSubscription(); } catch(e) {}
    var btn = document.getElementById('notif-btn');
    var banner = document.getElementById('notif-banner');
    if (sub && savedKey !== serverKey) { try { await sub.unsubscribe(); } catch(e) {} sub = null; }
    if (sub) {
      btn.style.opacity = '1'; banner.style.display = 'none';
      await authFetch('/chat/push-subscribe', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: myName, subscription: sub.toJSON()}) });
    } else if (perm === 'granted') { await subscribePush(serverKey); }
    else if (perm !== 'denied') { banner.style.display = 'block'; }
    btn.onclick = togglePush;
  } catch(e) {}
}
async function subscribePush(vapidKey) {
  try {
    if (!vapidKey) { vapidKey = (await (await authFetch('/chat/vapid-public-key')).json()).key; }
    var sub = await swReg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(vapidKey) });
    localStorage.setItem('chat-vapid-key', vapidKey);
    await authFetch('/chat/push-subscribe', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: myName, subscription: sub.toJSON()}) });
    document.getElementById('notif-btn').style.opacity = '1';
    document.getElementById('notif-banner').style.display = 'none';
  } catch(e) {}
}
async function enablePush() {
  var p = await Notification.requestPermission();
  if (p === 'granted') await subscribePush();
  else document.getElementById('notif-banner').style.display = 'none';
}
async function togglePush() {
  try {
    var sub = await swReg.pushManager.getSubscription();
    if (sub) {
      await sub.unsubscribe(); localStorage.removeItem('chat-vapid-key');
      await authFetch('/chat/push-unsubscribe', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: myName}) });
      document.getElementById('notif-btn').style.opacity = '.5'; return;
    }
    await enablePush();
  } catch(e) {}
}

// WebSocket
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = function() { ws.send(JSON.stringify({ type: 'join', username: myName, token: myToken })); };
  ws.onmessage = function(e) { handleMsg(JSON.parse(e.data)); };
  ws.onclose = function() { setTimeout(connect, 2000); };
}

function handleMsg(msg) {
  if (msg.type === 'auth_error') {
    sendLogout();
    clearStoredAuth(); location.reload(); return;
  }
  if (msg.type === 'history') {
    var unreadIds = [];
    msg.messages.forEach(function(m) {
      document.getElementById('messages').appendChild(buildMessage(m));
      trackTimestamp(m.timestamp);
      if (m.username !== myName && (!m.readBy || m.readBy.indexOf(myName) === -1)) unreadIds.push(m.id);
    });
    // Show load-more if we got a full page
    if (msg.messages.length >= 100) {
      setLoadMoreState('ready');
    } else {
      hasMore = false;
      setLoadMoreState('done');
    }
    scrollBottom();
    if (unreadIds.length && ws.readyState === 1) ws.send(JSON.stringify({ type: 'read', ids: unreadIds }));
  }
  else if (msg.type === 'online') { updateOnline(msg.users); }
  else if (msg.type === 'message') {
    document.getElementById('messages').appendChild(buildMessage(msg));
    trackTimestamp(msg.timestamp);
    scrollBottom();
    if (msg.username !== myName) {
      playNotifSound();
      if (document.hidden) incrementUnread();
      if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'read', ids: [msg.id] }));
    }
  }
  else if (msg.type === 'read') {
    msg.ids.forEach(function(id) {
      var entry = msgElements[id];
      if (entry && entry.statusEl) { entry.statusEl.textContent = '✓ Letto'; entry.statusEl.className = 'msg-status read'; }
    });
  }
  else if (msg.type === 'deleted') {
    var entry = msgElements[msg.id];
    if (entry && entry.wrap) {
      entry.wrap.style.transition = 'opacity .3s';
      entry.wrap.style.opacity = '0';
      setTimeout(function() { if (entry.wrap.parentNode) entry.wrap.parentNode.removeChild(entry.wrap); delete msgElements[msg.id]; }, 300);
    }
  }
  else if (msg.type === 'typing') { showTyping(msg.username); }
}

// URL linkify
var URL_RE = /(https?:\/\/[^\s<>"']+)/g;
function linkifyNode(text) {
  var frag = document.createDocumentFragment();
  text.split(URL_RE).forEach(function(part) {
    if (URL_RE.test(part)) { var a = document.createElement('a'); a.href = part; a.target = '_blank'; a.rel = 'noopener'; a.textContent = part; frag.appendChild(a); }
    else if (part) frag.appendChild(document.createTextNode(part));
    URL_RE.lastIndex = 0;
  });
  return frag;
}
function extractUrls(text) { return Array.from(text.matchAll(/(https?:\/\/[^\s<>"']+)/g)).map(function(m){return m[1];}); }

async function attachLinkPreviews(bubble, urls) {
  try {
    var res = await authFetch('/chat/preview?url=' + encodeURIComponent(urls[0]));
    var data = await res.json();
    if (!data.title && !data.image) return;
    var a = document.createElement('a'); a.href = urls[0]; a.target = '_blank'; a.className = 'link-preview';
    if (data.image) { var img = document.createElement('img'); img.src = data.image; img.className = 'link-preview-img'; img.onerror = function(){this.remove();}; a.appendChild(img); }
    var body = document.createElement('div'); body.className = 'link-preview-body';
    var site = document.createElement('div'); site.className = 'link-preview-site';
    if (data.favicon) { var fav = document.createElement('img'); fav.src = data.favicon; fav.onerror = function(){this.remove();}; site.appendChild(fav); }
    site.appendChild(document.createTextNode(data.siteName || new URL(urls[0]).hostname)); body.appendChild(site);
    if (data.title) { var t = document.createElement('div'); t.className = 'link-preview-title'; t.textContent = data.title; body.appendChild(t); }
    if (data.description) { var d = document.createElement('div'); d.className = 'link-preview-desc'; d.textContent = data.description; body.appendChild(d); }
    a.appendChild(body); bubble.appendChild(a);
  } catch(e){}
}

// Build message DOM element (does NOT append)
function buildMessage(msg) {
  var isMe = msg.username === myName;
  var wrap = document.createElement('div'); wrap.className = 'msg-wrap ' + (isMe ? 'me' : 'other');

  if (!isMe) { var nm = document.createElement('div'); nm.className = 'msg-name'; nm.textContent = msg.username; wrap.appendChild(nm); }

  var bubble = document.createElement('div'); bubble.className = 'bubble';

  // Reply quote
  if (msg.replyTo) {
    var rq = document.createElement('div'); rq.className = 'reply-quote';
    (function(rid) { rq.onclick = function() { scrollToMessage(rid); }; })(msg.replyTo.id);
    var rqName = document.createElement('div'); rqName.className = 'rq-name'; rqName.textContent = msg.replyTo.username; rq.appendChild(rqName);
    var rqText = document.createElement('div'); rqText.className = 'rq-text';
    rqText.textContent = (msg.replyTo.imageUrl && !msg.replyTo.text) ? '📎 Immagine' : (msg.replyTo.text || '');
    rq.appendChild(rqText); bubble.appendChild(rq);
  }

  if (msg.imageUrl) { var img = document.createElement('img'); img.src = msg.imageUrl; img.className = 'msg-img'; img.alt = ''; img.onclick = function(){openLightbox(msg.imageUrl);}; bubble.appendChild(img); }
  if (msg.text) { var p = document.createElement('p'); p.appendChild(linkifyNode(msg.text)); bubble.appendChild(p); var urls = extractUrls(msg.text); if (urls.length) attachLinkPreviews(bubble, urls); }
  wrap.appendChild(bubble);

  // Meta row
  var meta = document.createElement('div'); meta.className = 'msg-meta';

  // Reply button
  var replyBtn = document.createElement('button'); replyBtn.className = 'reply-btn'; replyBtn.textContent = '↩'; replyBtn.title = 'Rispondi';
  (function(m) { replyBtn.onclick = function(e) { e.stopPropagation(); startReply(m); }; })(msg);
  meta.appendChild(replyBtn);

  var time = document.createElement('span');
  time.textContent = new Date(msg.timestamp).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  meta.appendChild(time);

  var statusEl = null;
  if (isMe) {
    statusEl = document.createElement('span'); statusEl.className = 'msg-status';
    var isRead = msg.readBy && msg.readBy.some(function(r){return r !== myName;});
    statusEl.textContent = isRead ? '✓ Letto' : 'Inviato';
    if (isRead) statusEl.className = 'msg-status read';
    meta.appendChild(statusEl);
  }
  // Delete button (own messages only)
  if (isMe && msg.id) {
    var delBtn = document.createElement("button"); delBtn.className = "delete-btn"; delBtn.textContent = "🗑"; delBtn.title = "Elimina messaggio";
    (function(mid) { delBtn.onclick = function(e) { e.stopPropagation(); if (confirm("Eliminare questo messaggio?")) ws.send(JSON.stringify({ type: "delete", id: mid })); }; })(msg.id);
    meta.appendChild(delBtn);
  }

  wrap.appendChild(meta);

  // Track for read receipts, reply scrolling, status updates
  if (msg.id) msgElements[msg.id] = { wrap: wrap, statusEl: statusEl };

  return wrap;
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  var units = ['B', 'KB', 'MB', 'GB'];
  var value = bytes;
  var idx = 0;
  while (value >= 1024 && idx < units.length - 1) {
    value = value / 1024;
    idx++;
  }
  var fixed = value >= 10 || idx === 0 ? 0 : 1;
  return value.toFixed(fixed) + ' ' + units[idx];
}

function setPrivateSelectedFile(file) {
  privateSelectedFile = file || null;
  document.getElementById('private-file-name').textContent = file ? (file.name + ' • ' + formatBytes(file.size)) : '';

}

function renderPrivateTransfers(items) {
  var list = document.getElementById('private-transfer-list');
  list.innerHTML = '';

    var empty = document.createElement('li');
    empty.className = 'private-empty';
    empty.textContent = 'Nessun file caricato per ora.';
    list.appendChild(empty);
    return;
  }

  items.forEach(function(item) {
    var li = document.createElement('li');
    li.className = 'private-item';

    var main = document.createElement('div');
    main.className = 'private-item-main';

    var name = document.createElement('div');
    name.className = 'private-item-name';
    name.textContent = item.name;
    main.appendChild(name);

    if (item.note) {
      var note = document.createElement('div');
      note.className = 'private-item-note';
      note.appendChild(linkifyNode(item.note));
      main.appendChild(note);
    }

    var meta = document.createElement('div');
    meta.className = 'private-item-meta';
    meta.textContent = formatBytes(item.sizeBytes) + ' • ' + new Date(item.timestamp).toLocaleString('it-IT');
    main.appendChild(meta);

    li.appendChild(main);
    if (item.hasFile && item.downloadUrl) {
      var link = document.createElement('a');

      badge.className = 'private-note-badge';
      badge.textContent = 'Appunto';
      li.appendChild(badge);
    }
    list.appendChild(li);
  });
}

async function loadPrivateTransfers() {
  if (!canUsePrivateTransfers || privateTransferLoading) return;
  privateTransferLoading = true;
  var status = document.getElementById('private-upload-status');
  try {
    var res = await authFetch('/chat/private-transfers');
    if (res.status === 403) {
      canUsePrivateTransfers = false;
      document.getElementById('archive-btn').style.display = 'none';
      setView('chat');
      return;
    }
    if (!res.ok) throw new Error('Errore archivio');
    var items = await res.json();
    renderPrivateTransfers(items);
    status.textContent = '';
  } catch (e) {
    status.textContent = 'Non riesco a caricare l\'archivio privato.';
  }
  privateTransferLoading = false;
}

async function uploadPrivateTransfer(file) {
  if (!file || !canUsePrivateTransfers) return;
  var status = document.getElementById('private-upload-status');
  var button = document.getElementById('private-upload-btn');
  var noteEl = document.getElementById('private-note');
  var form = new FormData();
  form.append('file', file, file.name);
  if (noteEl.value.trim()) form.append('note', noteEl.value.trim());

  button.disabled = true;
  document.getElementById('private-save-note-btn').disabled = true;
  button.textContent = 'Carico...';
  status.textContent = 'Upload in corso di ' + formatBytes(file.size) + '...';
  try {
    var res = await authFetch('/chat/private-transfers/upload', { method: 'POST', body: form });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore upload');
    setPrivateSelectedFile(null);
    noteEl.value = '';
    status.textContent = 'File caricato. Limite attivo: ' + formatBytes(data.maxBytes) + '.';
    await loadPrivateTransfers();
  } catch (e) {
    status.textContent = e.message || 'Upload non riuscito.';
  } finally {
    button.disabled = false;
    document.getElementById('private-save-note-btn').disabled = false;
    button.textContent = 'Scegli file';
  }
}

async function savePrivateNote() {
  if (!canUsePrivateTransfers) return;
  var noteEl = document.getElementById('private-note');
  var note = noteEl.value.trim();
  var status = document.getElementById('private-upload-status');
  var btn = document.getElementById('private-save-note-btn');
  if (!note) {
    status.textContent = 'Scrivi prima un appunto o un link.';
    return;
  }
  btn.disabled = true;
  document.getElementById('private-submit-btn').disabled = true;
  status.textContent = 'Salvo appunto...';
  try {
    var res = await authFetch('/chat/private-transfers/note', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: note }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore salvataggio');
    noteEl.value = '';
    setPrivateSelectedFile(null);
    status.textContent = 'Appunto salvato.';
    await loadPrivateTransfers();
  } catch (e) {
    status.textContent = e.message || 'Salvataggio non riuscito.';
  } finally {
    btn.disabled = false;
    document.getElementById('private-submit-btn').disabled = !privateSelectedFile;
  }
}

function setTheme(theme) {
  var normalized = theme === 'dark' ? 'dark' : 'light';
  document.body.classList.toggle('theme-dark', normalized === 'dark');
  localStorage.setItem('chat-theme', normalized);
  var metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', normalized === 'dark' ? '#111723' : '#1f6fd2');
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = normalized === 'dark' ? '☀' : '◐';
  btn.title = normalized === 'dark' ? 'Passa al tema chiaro' : 'Passa al tema scuro';
  btn.setAttribute('aria-label', btn.title);
}

function toggleTheme() {
  setTheme(document.body.classList.contains('theme-dark') ? 'light' : 'dark');
}

function restoreTheme() {
  setTheme(localStorage.getItem('chat-theme') || 'light');
}

document.getElementById('archive-btn').onclick = function() {
  if (!canUsePrivateTransfers) return;
  var nextView = currentView === 'private' ? 'chat' : 'private';
  setView(nextView);
  if (nextView === 'private') loadPrivateTransfers();
};
document.getElementById('private-file-input').onchange = async function() {
  var file = this.files[0];
  this.value = '';
  setPrivateSelectedFile(file || null);
};
document.getElementById('private-submit-btn').onclick = function() {
  if (privateSelectedFile) uploadPrivateTransfer(privateSelectedFile);
};
document.getElementById('private-save-note-btn').onclick = savePrivateNote;
document.getElementById('private-refresh-btn').onclick = loadPrivateTransfers;
document.getElementById('theme-btn').onclick = toggleTheme;
restoreTheme();

function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
document.getElementById('lightbox').onclick = function() { document.getElementById('lightbox').classList.remove('open'); };
</script>
</body>
</html>
