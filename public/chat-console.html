<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console Chat</title>
  <meta name="theme-color" content="#0d1420" />
  <meta property="og:title" content="Cabras Chat — Console" />
  <meta property="og:description" content="Console di amministrazione" />
  <meta property="og:image" content="/chat/logo-v2.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/chat/logo-v2.png" />
  <link rel="icon" type="image/x-icon" href="/chat/favicon-v2.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/chat/favicon-32-v2.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/chat/icon-192-v2.png" />
  <style>
    :root {
      --bg-top: #090d14;
      --bg-bottom: #0f1623;
      --surface: rgba(14, 22, 34, 0.92);
      --surface-soft: rgba(18, 28, 42, 0.92);
      --border: rgba(229, 239, 252, 0.16);
      --ink: #f3f7fd;
      --muted: #a8b6c8;
      --primary: #78b3ff;
      --primary-soft: rgba(120, 179, 255, 0.14);
      --success: #74dda9;
      --warning: #f1c878;
      --shadow: 0 24px 60px rgba(0,0,0,.34);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--ink);
      padding: 18px;
    }
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .topbar, .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .topbar {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      letter-spacing: -.04em;
      margin-bottom: 6px;
    }
    .copy { color: var(--muted); line-height: 1.5; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn.primary {
      background: linear-gradient(180deg, #4f98f1, #3278d0);
      color: white;
    }
    .btn.ghost {
      background: rgba(255,255,255,.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .card {
      padding: 18px;
      grid-column: span 6;
    }
    .card.full { grid-column: 1 / -1; }
    .card h2 {
      font-size: 1.02rem;
      margin-bottom: 14px;
      letter-spacing: -.02em;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .stat-label {
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -.02em;
      word-break: break-word;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
    }
    .row .label { color: var(--muted); }
    .row .value { text-align: right; font-weight: 700; word-break: break-word; }
    .ok { color: var(--success); }
    .warn { color: var(--warning); }
    #status-line { color: var(--muted); font-size: .92rem; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font: inherit;
      color: var(--muted);
    }
    @media (max-width: 820px) {
      .card { grid-column: 1 / -1; }
      .stats { grid-template-columns: 1fr; }
      .row { flex-direction: column; }
      .row .value { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar">
      <div>
        <div class="eyebrow">Console</div>
        <h1>Raspberry e Chat</h1>
        <p class="copy">Cruscotto rapido per controllare lo stato della Raspberry, della chat e dei servizi collegati.</p>
      </div>
      <div class="actions">
        <a class="btn ghost" href="/chat">Torna alla chat</a>
        <button class="btn primary" id="refresh-btn" type="button">Aggiorna</button>
      </div>
    </section>

    <div id="status-line">Carico dati...</div>

    <section class="grid" id="console-grid" hidden>
      <article class="card">
        <h2>Raspberry</h2>
        <div class="stats" id="raspberry-stats"></div>
      </article>

      <article class="card">
        <h2>Chat</h2>
        <div class="stats" id="chat-stats"></div>
      </article>

      <article class="card">
        <h2>Test rapidi</h2>
        <div class="list" id="test-list"></div>
      </article>

      <article class="card">
        <h2>Rete</h2>
        <div class="list" id="network-list"></div>
      </article>

      <article class="card full">
        <h2>Dettagli</h2>
        <pre id="details"></pre>
      </article>
    </section>
  </div>

  <script>
    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return 'n/d';
      var units = ['B', 'KB', 'MB', 'GB'];
      var value = bytes;
      var idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx++;
      }
      var fixed = value >= 10 || idx === 0 ? 0 : 1;
      return value.toFixed(fixed) + ' ' + units[idx];
    }

    function formatLoadAvg(values) {
      return (values || []).map(function(v) { return Number(v || 0).toFixed(2); }).join(' • ');
    }

    function addStat(target, label, value) {
      var el = document.createElement('div');
      el.className = 'stat';
      el.innerHTML = '<div class="stat-label"></div><div class="stat-value"></div>';
      el.querySelector('.stat-label').textContent = label;
      el.querySelector('.stat-value').textContent = value;
      target.appendChild(el);
    }

    function addRow(target, label, value, klass) {
      var row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = '<div class="label"></div><div class="value"></div>';
      row.querySelector('.label').textContent = label;
      row.querySelector('.value').textContent = value;
      if (klass) row.querySelector('.value').classList.add(klass);
      target.appendChild(row);
    }

    function authHeaders(headers) {
      var out = Object.assign({}, headers || {});
      var username = localStorage.getItem('chat-user');
      var token = localStorage.getItem('chat-token');
      if (username && token) {
        out['X-Chat-Username'] = username;
        out['X-Chat-Token'] = token;
      }
      return out;
    }

    async function loadConsole() {
      var status = document.getElementById('status-line');
      var grid = document.getElementById('console-grid');
      status.textContent = 'Aggiorno dati...';
      try {
        var res = await fetch('/chat/console/data', { headers: authHeaders() });
        if (res.status === 401 || res.status === 403) {
          status.textContent = 'Sessione non valida o accesso non consentito. Torna alla chat e rientra come Giovanni.';
          grid.hidden = true;
          return;
        }
        if (!res.ok) throw new Error('Console non disponibile');
        var data = await res.json();

        var raspberry = document.getElementById('raspberry-stats');
        var chat = document.getElementById('chat-stats');
        var tests = document.getElementById('test-list');
        var network = document.getElementById('network-list');
        raspberry.innerHTML = '';
        chat.innerHTML = '';
        tests.innerHTML = '';
        network.innerHTML = '';

        addStat(raspberry, 'Hostname', data.raspberry.hostname || 'n/d');
        addStat(raspberry, 'Uptime', data.raspberry.uptimeHuman || 'n/d');
        addStat(raspberry, 'Temperatura', data.raspberry.temperatureC != null ? (data.raspberry.temperatureC.toFixed(1) + ' °C') : 'n/d');
        addStat(raspberry, 'Load avg', formatLoadAvg(data.raspberry.loadAvg));
        addStat(raspberry, 'RAM usata', formatBytes(data.raspberry.memory.used) + ' / ' + formatBytes(data.raspberry.memory.total));
        addStat(raspberry, 'Disco usato', data.raspberry.disk ? (formatBytes(data.raspberry.disk.used) + ' / ' + formatBytes(data.raspberry.disk.total)) : 'n/d');

        addStat(chat, 'Utenti online', String(data.chat.onlineCount));
        addStat(chat, 'Messaggi chat', String(data.chat.messageCount));
        addStat(chat, 'Elementi archivio', String(data.chat.privateTransferCount));
        addStat(chat, 'Web push', String(data.chat.pushSubscriptions));
        addStat(chat, 'Node', data.raspberry.node || 'n/d');

        addRow(tests, 'Cookie auth', data.tests.authCookiePresent ? 'OK' : 'Assente', data.tests.authCookiePresent ? 'ok' : 'warn');
        addRow(tests, 'SQLite', data.tests.sqliteOk ? 'OK' : 'Errore', data.tests.sqliteOk ? 'ok' : 'warn');
        addRow(tests, 'Accesso locale', data.tests.localAccess ? 'Si' : 'No', data.tests.localAccess ? 'ok' : 'warn');
        addRow(tests, 'Limite upload remoto', data.tests.uploadRemoteLimitMb + ' MB');
        addRow(tests, 'Limite upload locale', data.tests.uploadLocalLimitMb + ' MB');
        addRow(tests, 'Push VAPID', data.chat.vapidConfigured ? 'Configurato' : 'Assente', data.chat.vapidConfigured ? 'ok' : 'warn');

        addRow(network, 'IP locali', (data.raspberry.localIps || []).join(', ') || 'n/d');
        addRow(network, 'CPU', (data.raspberry.cpuModel || 'n/d') + ' • ' + data.raspberry.cpuCount + ' core');
        addRow(network, 'Piattaforma', data.raspberry.platform || 'n/d');
        addRow(network, 'Online in chat', (data.chat.usersOnline || []).join(', ') || 'Nessuno');

        document.getElementById('details').textContent = JSON.stringify(data, null, 2);
        status.textContent = 'Ultimo aggiornamento: ' + new Date(data.generatedAt).toLocaleString('it-IT');
        grid.hidden = false;
      } catch (err) {
        grid.hidden = true;
        status.textContent = 'Non riesco a caricare la console.';
      }
    }

    document.getElementById('refresh-btn').onclick = loadConsole;
    loadConsole();
  </script>
</body>
</html>
