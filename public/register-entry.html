<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raspi Chat — Registrati</title>
  <meta name="description" content="Pagina di accesso alla registrazione per Raspi Chat." />
  <meta name="theme-color" content="#050505" />
  <meta name="robots" content="noindex,nofollow" />
  <meta property="og:title" content="Raspi Chat — Registrati" />
  <meta property="og:image" content="/chat/logo-v2.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/chat/logo-v2.png" />
  <link rel="icon" type="image/x-icon" href="/chat/favicon-v2.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/chat/favicon-32-v2.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/chat/icon-192-v2.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #111111;
      --panel: rgba(16, 16, 16, 0.94);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f5f5f5;
      --muted: #a5a5a5;
      --accent: #94dfff;
      --danger: #ff8f8f;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Titillium Web", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.07), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(180deg, #020202 0%, #070707 42%, #111111 100%);
      min-height: 100dvh;
      padding: 18px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 80%);
      opacity: 0.55;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 6px), 860px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.88);
      color: var(--muted);
    }

    .pill img {
      width: 18px;
      height: 18px;
      border-radius: 6px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 2rem;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(148, 223, 255, 0.08);
      color: var(--accent);
      font-size: .8rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.5rem, 7vw, 4.6rem);
      line-height: .94;
      letter-spacing: -.06em;
    }

    .lead {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 1.06rem;
      max-width: 42rem;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      min-height: 58px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(8, 8, 8, 0.86);
      color: var(--text);
      padding: 0 16px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(148, 223, 255, 0.38);
      box-shadow: 0 0 0 4px rgba(148, 223, 255, 0.12);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      font: inherit;
      font-weight: 800;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(180deg, #94dfff, #7ecdee);
      color: #050505;
    }

    .btn.ghost {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
    }

    .status {
      min-height: 1.4em;
      margin-top: 12px;
      color: var(--muted);
    }

    .status.error { color: var(--danger); }

    .micro {
      margin-top: 10px;
      color: #7f7f7f;
      font-size: .92rem;
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 4px), 860px);
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .card {
        padding: 22px;
        border-radius: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a class="pill" href="https://tongatron.github.io/" target="_blank" rel="noopener noreferrer">
        <img src="/chat/logo-v2.png" alt="Tongatron" />
        <span>tongatron.github.io</span>
      </a>
      <a class="pill" href="/">Torna alla home</a>
    </div>

    <main class="card">
      <div class="eyebrow">Registrati</div>
      <h1>Entra in Raspi Chat</h1>
      <p class="lead">Registrati direttamente con nome e password. Dopo il primo accesso entri subito nella tua stanza iniziale con l'admin.</p>

      <label for="username-input">Nome utente</label>
      <input id="username-input" type="text" autocomplete="username" maxlength="30" placeholder="Il tuo nome" />

      <label for="password-input" style="margin-top:14px;">Password</label>
      <input id="password-input" type="password" autocomplete="new-password" placeholder="Scegli una password" />

      <label for="password-repeat-input" style="margin-top:14px;">Ripeti password</label>
      <input id="password-repeat-input" type="password" autocomplete="new-password" placeholder="Ripeti la password" />

      <div class="actions">
        <button class="btn primary" id="open-invite-btn" type="button">Registrati</button>
        <a class="btn ghost" href="/chat">Accedi</a>
      </div>

      <div class="status" id="status"></div>
      <div class="micro">La tua stanza iniziale verra' creata automaticamente con l'admin.</div>
    </main>
  </div>

  <script>
    var usernameInput = document.getElementById('username-input');
    var passwordInput = document.getElementById('password-input');
    var repeatInput = document.getElementById('password-repeat-input');
    var statusEl = document.getElementById('status');
    var openBtn = document.getElementById('open-invite-btn');

    function setStatus(message, kind) {
      statusEl.textContent = message || '';
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    async function registerDirect() {
      var username = usernameInput.value.trim();
      var password = passwordInput.value;
      var repeat = repeatInput.value;
      if (!username) {
        setStatus('Inserisci un nome utente.', 'error');
        return;
      }
      if (password.length < 4) {
        setStatus('La password deve avere almeno 4 caratteri.', 'error');
        return;
      }
      if (password !== repeat) {
        setStatus('Le password non coincidono.', 'error');
        return;
      }
      openBtn.disabled = true;
      setStatus('Creo il tuo account...');
      try {
        var res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registrazione non riuscita');
        localStorage.setItem('chat-user', data.username);
        localStorage.setItem('chat-token', data.token);
        if (data.firstRoomId) localStorage.setItem('chat-room-id', data.firstRoomId);
        setStatus('Account creato. Accesso in corso...');
        setTimeout(function() {
          location.href = '/chat';
        }, 300);
      } catch (e) {
        setStatus(e.message || 'Registrazione non riuscita', 'error');
        openBtn.disabled = false;
      }
    }

    openBtn.addEventListener('click', registerDirect);
    [usernameInput, passwordInput, repeatInput].forEach(function(input) {
      input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          registerDirect();
        }
      });
    });
  </script>
</body>
</html>
