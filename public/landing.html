<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raspi Chat</title>
  <meta name="description" content="Raspi Chat e' un progetto self-hosted pensato per piccoli gruppi, con stanze private, notifiche web e amministrazione semplice." />
  <meta name="theme-color" content="#050505" />
  <meta property="og:title" content="Raspi Chat" />
  <meta property="og:description" content="Progetto self-hosted pensato per piccoli gruppi, con stanze private, notifiche web e amministrazione semplice." />
  <meta property="og:image" content="/chat/assets/logo-v2.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/chat/assets/logo-v2.png" />
  <link rel="icon" type="image/x-icon" href="/chat/assets/favicon-v2.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/chat/assets/favicon-32-v2.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/chat/assets/icon-192-v2.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #111111;
      --panel: rgba(16, 16, 16, 0.94);
      --panel-soft: rgba(10, 10, 10, 0.96);
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.22);
      --text: #f5f5f5;
      --muted: #a5a5a5;
      --accent: #94dfff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Titillium Web", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.07), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(180deg, #020202 0%, #070707 42%, #111111 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 80%);
      opacity: 0.55;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      margin: 0 auto 42px;
    }

    .topbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 0 14px;
    }

    .site-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24);
      font-size: .92rem;
      font-weight: 700;
    }

    .site-badge-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .hero {
      padding: 0;
      margin-bottom: 0;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(148, 223, 255, 0.08);
      color: var(--accent);
      font-size: .8rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.1rem, 6vw, 3.4rem);
      line-height: .96;
      letter-spacing: -.06em;
      font-weight: 700;
    }

    .lead {
      margin: 8px auto 0;
      max-width: 40rem;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.12rem);
    }

    .hero-logo-wrap {
      display: flex;
      justify-content: center;
      margin: 0;
    }

    .hero-logo {
      width: 80%;
      max-width: 384px;
      height: auto;
      display: block;
    }

    .status-badge-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: .96rem;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #5f5f5f;
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.03);
      flex: 0 0 auto;
    }

    .status-dot.online {
      background: #59d67b;
      box-shadow: 0 0 0 6px rgba(89, 214, 123, 0.08);
    }

    .status-dot.offline {
      background: #ff6b6b;
      box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.08);
    }

    .cta {
      display: flex;
      justify-content: center;
      padding: 8px 0 0;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      font: inherit;
      font-weight: 700;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(180deg, #94dfff, #7ecdee);
      color: #050505;
      box-shadow: 0 18px 30px rgba(148, 223, 255, 0.18);
    }

    .btn.ghost {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
    }

    @media (max-width: 840px) {
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 16px), 980px);
      }

      .hero {
        padding: 42px 8px 24px;
      }

      .hero-logo {
        width: min(280px, calc(100vw - 40px));
      }

    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a class="site-badge" href="https://tongatron.github.io/" target="_blank" rel="noreferrer">
        <span class="site-badge-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8.48 10.901C11.211 10.227 13 7.837 13 5A5 5 0 0 0 3 5c0 2.837 1.789 5.227 4.52 5.901l-.244.487a.25.25 0 1 0 .448.224l.04-.08c.009.17.024.315.051.45.068.344.208.622.448 1.102l.013.028c.212.422.182.85.05 1.246-.135.402-.366.751-.534 1.003a.25.25 0 0 0 .416.278l.004-.007c.166-.248.431-.646.588-1.115.16-.479.212-1.051-.076-1.629-.258-.515-.365-.732-.419-1.004a2 2 0 0 1-.037-.289l.008.017a.25.25 0 1 0 .448-.224zM4.352 3.356a4 4 0 0 1 3.15-2.325C7.774.997 8 1.224 8 1.5s-.226.496-.498.542c-.95.162-1.749.78-2.173 1.617a.6.6 0 0 1-.52.341c-.346 0-.599-.329-.457-.644"/>
          </svg>
        </span>
        <span>tongatron.github.io</span>
      </a>
      <a class="site-badge" href="https://github.com/tongatron/raspi-chat" target="_blank" rel="noreferrer" style="margin-top:8px;">
        <span class="site-badge-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
          </svg>
        </span>
        <span>raspi-chat su GitHub</span>
      </a>
    </div>

    <section class="hero">
      <div class="hero-logo-wrap">
        <img class="hero-logo" src="/chat/assets/raspinew-home.png?v=4" alt="Raspi Chat logo" />
      </div>
      <p class="lead">Progetto self-hosted pensato per piccoli gruppi, con stanze private, notifiche web e amministrazione semplice.</p>
    </section>

    <div class="status-badge-wrap">
      <div class="status-badge">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-badge-text">Verifico la Raspberry...</span>
      </div>
    </div>

    <section class="cta">
      <div class="actions">
        <a class="btn primary" href="/register">Registrati</a>
        <a class="btn ghost" href="/chat">Accedi</a>
      </div>
    </section>
  </div>

  <script>
    fetch('/status', { cache: 'no-store' })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var ok = !!(data && data.ok);
        var dot = document.getElementById('status-dot');
        var badge = document.getElementById('status-badge-text');
        dot.className = 'status-dot ' + (ok ? 'online' : 'offline');
        badge.textContent = ok ? 'Raspberry online' : 'Raspberry offline';
      })
      .catch(function() {
        var dot = document.getElementById('status-dot');
        var badge = document.getElementById('status-badge-text');
        dot.className = 'status-dot offline';
        badge.textContent = 'Raspberry offline';
      });
  </script>
</body>
</html>
